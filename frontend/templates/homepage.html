<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HPCL Access - Your AI Assistant for HPCL</title>

    <!-- Main CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles1.css') }}"
    />

    <!-- Spline Robot Viewer -->
    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.10.26/build/spline-viewer.js"
    ></script>
  </head>
  <body class="gradient-sides">
    <!-- Spline 3D Robot -->
    <spline-viewer
      url="https://prod.spline.design/Kos9n4OjllWwFPvt/scene.splinecode"
      id="robot-background"
      events-target="global"
      loading="eager"
    >
    </spline-viewer>

    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-left">
        <span class="brand-name">HPCL Access</span>
      </div>
      <div class="nav-right">
        <a
          href="https://www.hindustanpetroleum.com/"
          target="_blank"
          class="nav-link"
          >About Us</a
        >
      </div>
    </nav>

    <!-- HPCL Logo -->
    <div class="logo-section">
      <img
        src="{{ url_for('static', filename='images/hpcl-full-logo.png') }}"
        alt="HPCL Logo"
        class="main-logo"
      />
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <h1 class="main-title">
        <span>Welcome</span> <span>to</span><br />
        <span>the</span> <span class="hp-highlight">HPCL Access</span>
        <span>era</span>
      </h1>

      <p class="subtitle">
        Your AI Assistant for HPCL.
      </p>

      <div class="product-buttons">
        <a href="{{ url_for('login') }}" class="product-btn">HPGPT</a>
        <a href="#" class="product-btn">Employee Assistant</a>
        <a href="{{ voice_bot_url }}" target="_blank" rel="noopener noreferrer" class="product-btn">Voice Chat</a>
        <a href="{{ doc_gen_url }}" target="_blank" rel="noopener noreferrer" class="product-btn">Document Generator</a>
      </div>

    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='main1.js') }}"></script>
  </body>
</html>
